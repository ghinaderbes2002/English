services:
  db:
    image: postgres:16-alpine
    container_name: lectures_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-lectures_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lectures_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lectures_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-lectures_db}?schema=public
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      UPLOAD_PATH: ./uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-52428800}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      RUN_SEED: ${RUN_SEED:-false}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - lectures_net

volumes:
  postgres_data:
  uploads_data:

networks:
  lectures_net:
    driver: bridge
